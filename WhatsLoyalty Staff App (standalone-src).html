<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440, initial-scale=1"/>
<title>WhatsLoyalty · App de Comercio</title>
<template id="__bundler_thumbnail" data-bg-color="#0a0f0c">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0a0f0c"/>
    <g transform="translate(600 400)">
      <rect x="-140" y="-220" width="280" height="440" rx="48" fill="#0a0f0c" stroke="#00C851" stroke-width="4"/>
      <rect x="-110" y="-190" width="220" height="380" rx="24" fill="#04200f"/>
      <circle cx="0" cy="0" r="70" fill="none" stroke="#00C851" stroke-width="6"/>
      <path d="M-28 0 L-6 22 L30 -18" fill="none" stroke="#00C851" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="600" y="720" fill="#00C851" text-anchor="middle" font-family="serif" font-style="italic" font-size="42">WhatsLoyalty Staff</text>
  </svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
  :root {
    --paper: #F6F5F0;
    --paper2: #ECEAE1;
    --paper3: #E0DCCD;
    --ink: #0A0F0C;
    --ink3: #3d4540;
    --ink4: #6b7570;
    --line: #dcd9cc;
    --green: #00C851;
    --greenDeep: #00a843;
    --greenDark: #04200f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); font-family: "Inter Tight", -apple-system, system-ui, sans-serif; color: var(--ink); min-height: 100vh; }
  body { display: flex; flex-direction: column; }
  .page { flex: 1; padding: 32px 24px 160px; }
  .hdr { display: flex; align-items: center; justify-content: space-between; margin: 0 auto 18px; max-width: 1320px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 30px; height: 30px; border-radius: 8px; background: var(--ink); color: var(--green); display: grid; place-items: center; font-weight: 700; font-size: 15px; font-family: "Inter Tight"; }
  .logo-word { font-family: "Instrument Serif"; font-size: 22px; letter-spacing: -.01em; }
  .logo-word em { font-style: italic; color: var(--greenDeep); }
  .pill { padding: 6px 12px; border-radius: 100px; font-family: "JetBrains Mono"; font-size: 10px; letter-spacing: .12em; background: var(--ink); color: var(--green); text-transform: uppercase; }

  /* Phone canvas */
  .canvas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px 28px; max-width: 1320px; margin: 0 auto; }
  .phone-cell { display: flex; flex-direction: column; align-items: center; }
  .phone-cell > .caption { margin-bottom: 14px; text-align: center; max-width: 360px; }
  .caption .idx { font-family: "JetBrains Mono"; font-size: 11px; letter-spacing: .14em; color: var(--ink4); margin-bottom: 4px; }
  .caption .ttl { font-family: "Instrument Serif"; font-size: 22px; letter-spacing: -.01em; }
  .caption .ttl em { font-style: italic; color: var(--greenDeep); }
  .caption .sub { font-size: 12px; color: var(--ink4); margin-top: 4px; line-height: 1.4; }

  .phone-frame { width: 340px; height: 735px; border-radius: 48px; background: #0a0f0c; position: relative; padding: 10px; box-shadow: 0 30px 60px rgba(10,15,12,.18), 0 0 0 1.5px rgba(10,15,12,.1); }
  .phone-screen { width: 100%; height: 100%; border-radius: 40px; overflow: hidden; position: relative; background: #fff; }
  .phone-island { position: absolute; top: 19px; left: 50%; transform: translateX(-50%); width: 106px; height: 32px; border-radius: 24px; background: #000; z-index: 50; }

  /* Focus mode — single phone large */
  body.focus .canvas { grid-template-columns: 1fr; place-items: center; }
  body.focus .phone-frame { width: 390px; height: 840px; }
  body.focus .phone-cell .caption { display: none; }

  /* Selector bar */
  .selector { position: fixed; left: 0; right: 0; bottom: 0; background: rgba(246,245,240,.92); backdrop-filter: blur(14px); border-top: 1px solid var(--line); padding: 12px 20px; display: flex; align-items: center; gap: 12px; z-index: 100; overflow-x: auto; white-space: nowrap; }
  .selector-label { font-family: "JetBrains Mono"; font-size: 10px; letter-spacing: .14em; color: var(--ink4); text-transform: uppercase; flex-shrink: 0; }
  .chip { padding: 8px 14px; border-radius: 100px; background: #fff; border: 1px solid var(--line); font-size: 12.5px; font-family: "Inter Tight"; font-weight: 500; color: var(--ink3); cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .chip:hover { background: var(--paper2); }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .chip .num { font-family: "JetBrains Mono"; font-size: 10px; opacity: .7; }
  .sel-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .toggle { padding: 7px 12px; border-radius: 100px; background: #fff; border: 1px solid var(--line); font-size: 11.5px; font-family: "Inter Tight"; font-weight: 500; color: var(--ink3); cursor: pointer; }
  .toggle.on { background: var(--green); color: var(--greenDark); border-color: var(--green); }

  /* Tweaks panel */
  .tweaks { position: fixed; right: 24px; bottom: 82px; width: 300px; background: #fff; border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 20px 48px rgba(10,15,12,.18); padding: 14px 16px; z-index: 200; font-family: "Inter Tight"; display: none; }
  .tweaks.open { display: block; }
  .tweaks h3 { margin: 0 0 12px; font-family: "Instrument Serif"; font-size: 18px; font-weight: 400; letter-spacing: -.01em; display: flex; align-items: center; justify-content: space-between; }
  .tweaks .close { background: var(--paper2); border: none; width: 24px; height: 24px; border-radius: 8px; cursor: pointer; font-size: 12px; color: var(--ink3); }
  .tw-group { margin-bottom: 14px; }
  .tw-group:last-child { margin-bottom: 0; }
  .tw-group label { font-family: "JetBrains Mono"; font-size: 10px; letter-spacing: .12em; color: var(--ink4); text-transform: uppercase; display: block; margin-bottom: 6px; }
  .tw-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tw-opt { padding: 6px 10px; border-radius: 8px; background: var(--paper); border: 1px solid var(--line); font-size: 11px; font-family: "Inter Tight"; cursor: pointer; flex: 1; text-align: center; }
  .tw-opt.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .tw-swatch { width: 26px; height: 26px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
  .tw-swatch.on { border-color: var(--ink); box-shadow: 0 0 0 2px #fff inset; }
</style>
</head>

<body>

<div class="page">
  <div class="hdr">
    <div class="logo">
      <div class="logo-mark">W</div>
      <div class="logo-word">Whats<em>Loyalty</em> · Staff</div>
    </div>
    <div class="pill">● Mock interactivo · 6 pantallas</div>
  </div>

  <div id="canvas-root" class="canvas"></div>
</div>

<!-- Selector -->
<div class="selector" id="selector">
  <span class="selector-label">Pantallas</span>
  <div id="chips" style="display:flex; gap:8px;"></div>
  <div class="sel-right">
    <button class="toggle" id="focus-toggle">Vista individual</button>
    <button class="toggle" id="tweaks-btn">Tweaks</button>
  </div>
</div>

<!-- Tweaks -->
<div class="tweaks" id="tweaks">
  <h3>Tweaks <button class="close" onclick="toggleTweaks()">×</button></h3>
  <div class="tw-group">
    <label>Color de acento</label>
    <div class="tw-row" id="tw-color"></div>
  </div>
  <div class="tw-group">
    <label>Nombre del negocio</label>
    <div class="tw-row">
      <input id="tw-brand" value="Café Moreno" style="flex:1; padding:7px 10px; border-radius:8px; border:1px solid var(--line); font-family:'Inter Tight'; font-size:12px;"/>
    </div>
  </div>
  <div class="tw-group">
    <label>Modo escáner</label>
    <div class="tw-row">
      <button class="tw-opt" data-sc="dark">Oscuro</button>
      <button class="tw-opt" data-sc="light">Claro</button>
    </div>
  </div>
  <div class="tw-group">
    <label>Densidad lista historial</label>
    <div class="tw-row">
      <button class="tw-opt" data-dn="cozy">Cómoda</button>
      <button class="tw-opt" data-dn="dense">Densa</button>
    </div>
  </div>
</div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="staff-screens.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#00C851",
  "brand": "Café Moreno",
  "scannerMode": "dark",
  "density": "cozy"
}/*EDITMODE-END*/;

const SCREENS = [
  { id: 'login',   label: 'Login',     num: '01', sub: 'PIN de turno · onboarding rápido' },
  { id: 'home',    label: 'Escáner',   num: '02', sub: 'Home · QR del cliente en WhatsApp' },
  { id: 'client',  label: 'Cliente',   num: '03', sub: 'Ficha + importe + sumar puntos' },
  { id: 'confirm', label: 'Confirmado',num: '04', sub: 'Preview del mensaje enviado' },
  { id: 'redeem',  label: 'Canje',     num: '05', sub: 'QR de recompensa del cliente' },
  { id: 'history', label: 'Historial', num: '06', sub: 'Turno en vivo · anular venta' },
];

function App() {
  const [screen, setScreen] = React.useState(localStorage.getItem('wl_staff_screen') || 'all');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => { localStorage.setItem('wl_staff_screen', screen); }, [screen]);

  // nav fn passed into screens
  const go = (id) => setScreen(id);

  const renderScreen = (id) => {
    switch (id) {
      case 'login':   return <LoginScreen onNext={()=>go('home')}/>;
      case 'home':    return <HomeScreen onScan={()=>go('client')} onRedeem={()=>go('redeem')} onHistory={()=>go('history')} onManual={()=>go('client')}/>;
      case 'client':  return <ClientScreen onConfirm={()=>go('confirm')} onBack={()=>go('home')} onRedeem={()=>go('redeem')}/>;
      case 'confirm': return <ConfirmScreen onHome={()=>go('home')}/>;
      case 'redeem':  return <RedeemScreen onBack={()=>go('home')} onConfirm={()=>go('confirm')}/>;
      case 'history': return <HistoryScreen onBack={()=>go('home')}/>;
    }
  };

  const list = screen === 'all' ? SCREENS.map(s=>s.id) : [screen];
  const focusMode = screen !== 'all';

  React.useEffect(() => {
    document.body.classList.toggle('focus', focusMode);
    document.getElementById('focus-toggle').classList.toggle('on', focusMode);
    document.getElementById('focus-toggle').textContent = focusMode ? 'Ver todas' : 'Vista individual';
  }, [focusMode]);

  // render chip state
  React.useEffect(() => {
    const chips = document.getElementById('chips');
    chips.innerHTML = '';
    const all = document.createElement('button');
    all.className = 'chip' + (screen === 'all' ? ' on' : '');
    all.innerHTML = '<span class="num">★</span> Ver todas';
    all.onclick = () => setScreen('all');
    chips.appendChild(all);
    SCREENS.forEach(s => {
      const c = document.createElement('button');
      c.className = 'chip' + (screen === s.id ? ' on' : '');
      c.innerHTML = `<span class="num">${s.num}</span> ${s.label}`;
      c.onclick = () => setScreen(s.id);
      chips.appendChild(c);
    });
  }, [screen]);

  return (
    <>
      {list.map(id => {
        const meta = SCREENS.find(s => s.id === id);
        return (
          <div key={id} className="phone-cell">
            <div className="caption">
              <div className="idx">{meta.num} · {meta.label.toUpperCase()}</div>
              <div className="ttl">{meta.sub.split(' · ')[0]}</div>
              <div className="sub">{meta.sub.split(' · ').slice(1).join(' · ')}</div>
            </div>
            <div className="phone-frame">
              <div className="phone-island"/>
              <div className="phone-screen">{renderScreen(id)}</div>
            </div>
          </div>
        );
      })}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('canvas-root')).render(<App/>);

// ────── Tweaks panel ──────
const tweaks = document.getElementById('tweaks');
const btn = document.getElementById('tweaks-btn');
function toggleTweaks() { tweaks.classList.toggle('open'); btn.classList.toggle('on', tweaks.classList.contains('open')); }
window.toggleTweaks = toggleTweaks;
btn.onclick = toggleTweaks;

// accent swatches
const colors = ['#00C851', '#4A7A8C', '#E0A330', '#E55A4B', '#7A5AE0'];
const cwrap = document.getElementById('tw-color');
colors.forEach(c => {
  const s = document.createElement('button');
  s.className = 'tw-swatch' + (c === TWEAK_DEFAULTS.accent ? ' on' : '');
  s.style.background = c;
  s.onclick = () => {
    document.documentElement.style.setProperty('--green', c);
    document.querySelectorAll('.tw-swatch').forEach(x=>x.classList.remove('on'));
    s.classList.add('on');
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accent:c}}, '*');
  };
  cwrap.appendChild(s);
});

// brand
document.getElementById('tw-brand').oninput = e => {
  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{brand:e.target.value}}, '*');
};

// scanner mode toggles (cosmetic — cycles chip state)
document.querySelectorAll('[data-sc]').forEach(b => {
  if (b.dataset.sc === TWEAK_DEFAULTS.scannerMode) b.classList.add('on');
  b.onclick = () => {
    document.querySelectorAll('[data-sc]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{scannerMode:b.dataset.sc}}, '*');
  };
});
document.querySelectorAll('[data-dn]').forEach(b => {
  if (b.dataset.dn === TWEAK_DEFAULTS.density) b.classList.add('on');
  b.onclick = () => {
    document.querySelectorAll('[data-dn]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{density:b.dataset.dn}}, '*');
  };
});

// Edit mode integration
window.addEventListener('message', (e) => {
  if (e.data?.type === '__activate_edit_mode') tweaks.classList.add('open');
  if (e.data?.type === '__deactivate_edit_mode') tweaks.classList.remove('open');
});
window.parent.postMessage({type:'__edit_mode_available'}, '*');

// apply initial accent
document.documentElement.style.setProperty('--green', TWEAK_DEFAULTS.accent);
</script>

</body>
</html>
