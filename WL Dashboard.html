<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel · WhatsLoyalty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="wl-config.js"></script>
<script src="wl-data.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--paper:#F6F5F0;--paper2:#ECEAE1;--paper3:#E0DCCD;--ink:#0A0F0C;--ink3:#3d4540;--ink4:#6b7570;--line:#dcd9cc;--green:#00C851;--greenDeep:#00a843;--red:#d84848}
  html,body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .serif{font-family:'Instrument Serif',serif}
  .mono{font-family:'JetBrains Mono',monospace}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}

  .top{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--line);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;gap:24px}
  .top-l{display:flex;align-items:center;gap:14px}
  .back{font-size:12px;color:var(--ink4);padding:6px 10px;border:1px solid var(--line);border-radius:6px}
  .back:hover{border-color:var(--ink);color:var(--ink)}
  .biz-pick{position:relative}
  .biz-btn{display:flex;align-items:center;gap:10px;padding:6px 12px 6px 6px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .biz-btn:hover{border-color:var(--ink)}
  .biz-dot{width:28px;height:28px;border-radius:6px;background:var(--ink);display:grid;place-items:center;color:var(--paper);font-weight:700;font-size:13px}
  .biz-name{font-weight:600;font-size:14px}
  .biz-sec{font-size:11px;color:var(--ink4);text-align:left}
  .biz-chev{font-size:10px;color:var(--ink4);margin-left:4px}
  .biz-menu{position:absolute;top:100%;left:0;margin-top:6px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.08);min-width:260px;overflow:hidden;display:none;z-index:50}
  .biz-menu.open{display:block}
  .biz-menu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer}
  .biz-menu-item:last-child{border-bottom:none}
  .biz-menu-item:hover{background:var(--paper2)}
  .biz-menu-item.active{background:var(--paper2)}
  .top-r{display:flex;align-items:center;gap:16px}
  .top-nav{display:flex;gap:4px;padding:3px;background:var(--paper2);border-radius:8px}
  .top-nav a{padding:6px 12px;border-radius:6px;font-size:12px;color:var(--ink4)}
  .top-nav a.on{background:var(--paper);color:var(--ink);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .top-meta{font-size:11px;color:var(--ink4);display:flex;gap:10px;align-items:center}
  .top-meta .dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .page{max-width:1400px;margin:0 auto;padding:32px 28px 64px}
  .page-head{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;padding-bottom:24px;border-bottom:1px solid var(--line);margin-bottom:28px}
  .page-kicker{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:10px}
  .page-title{font-family:'Instrument Serif',serif;font-size:48px;letter-spacing:-.02em;line-height:1}
  .page-sub{font-size:13px;color:var(--ink4);margin-top:8px}
  .pills{display:flex;gap:6px;padding:3px;background:var(--paper2);border-radius:8px}
  .pills button{padding:6px 14px;border-radius:6px;font-size:12px;color:var(--ink4)}
  .pills button.on{background:var(--paper);color:var(--ink);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.05)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px 22px}
  .kpi .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .kpi .delta{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 6px;border-radius:3px;background:var(--paper2);letter-spacing:0;text-transform:none}
  .kpi .delta.up{color:var(--greenDeep)}
  .kpi .delta.down{color:var(--red)}
  .kpi .v{font-size:32px;font-weight:600;letter-spacing:-.02em}
  .kpi .sub{font-size:11px;color:var(--ink4);margin-top:6px}

  .grid{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-bottom:20px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px 24px}
  .panel-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  .panel-title{font-family:'Instrument Serif',serif;font-size:22px;letter-spacing:-.01em}
  .panel-sub{font-size:11px;color:var(--ink4)}

  .chart{height:200px;display:flex;align-items:end;gap:3px;padding-top:20px;border-bottom:1px solid var(--line);padding-bottom:6px;position:relative}
  .bar{flex:1;background:linear-gradient(to top,var(--greenDeep),var(--green));border-radius:3px 3px 0 0;min-height:2px;position:relative;transition:opacity .2s}
  .bar:hover{opacity:.8}
  .bar-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:6px 10px;border-radius:6px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;font-weight:500}
  .bar:hover .bar-tooltip{opacity:1}
  .chart-x{display:flex;gap:3px;margin-top:8px;font-size:9px;color:var(--ink4);font-family:'JetBrains Mono',monospace}
  .chart-x div{flex:1;text-align:center}

  .segments{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .seg{padding:14px;background:var(--paper2);border-radius:8px}
  .seg .k{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:6px}
  .seg .v{font-size:24px;font-weight:600;letter-spacing:-.02em}
  .seg .b{font-size:11px;color:var(--ink4);margin-top:4px}

  .activity{display:flex;flex-direction:column;gap:0}
  .act{display:grid;grid-template-columns:auto 1fr auto;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);align-items:center}
  .act:last-child{border:none}
  .act-ico{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:14px}
  .act-ico.sale{background:#d9f5e3;color:var(--greenDeep)}
  .act-ico.redeem{background:#fff2d9;color:#b77c0d}
  .act-ico.welcome{background:#dbe9ff;color:#2860c7}
  .act-ico.spin,.act-ico.scratch{background:#f2dcff;color:#7a2fc4}
  .act-ico.review{background:#ffe0e0;color:#b03535}
  .act-body{line-height:1.3}
  .act-name{font-size:13px;font-weight:500}
  .act-note{font-size:11px;color:var(--ink4);margin-top:2px}
  .act-time{font-size:11px;color:var(--ink4);text-align:right;font-family:'JetBrains Mono',monospace}

  .customers-panel{margin-top:0}
  .customers{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:0;border-top:1px solid var(--line)}
  .customers-head{display:contents;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4)}
  .customers-head>div{padding:10px 8px;border-bottom:1px solid var(--line);background:var(--paper)}
  .cust{display:contents}
  .cust>div{padding:12px 8px;border-bottom:1px solid var(--line);font-size:13px;display:flex;align-items:center}
  .cust:hover>div{background:var(--paper2)}
  .cust-name{font-weight:500;display:flex;align-items:center;gap:10px}
  .cust-avatar{width:28px;height:28px;border-radius:50%;background:var(--paper3);display:grid;place-items:center;font-size:11px;font-weight:600;color:var(--ink3)}
  .cust-phone{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink4)}
  .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace}
  .badge.active{background:#d9f5e3;color:var(--greenDeep)}
  .badge.dormant{background:#ffe0e0;color:var(--red)}

  .rewards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .rw{padding:14px;border:1px solid var(--line);border-radius:10px;display:flex;justify-content:space-between;align-items:center}
  .rw.feat{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .rw-name{font-size:13px;font-weight:500}
  .rw-cost{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink4)}
  .rw.feat .rw-cost{color:var(--paper3)}
  .rw-ico{font-size:20px}

  .alerts{display:flex;flex-direction:column;gap:8px}
  .alert{padding:12px 14px;border-radius:8px;background:var(--paper2);display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
  .alert-ico{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;font-size:13px;background:#fff}
  .alert-body .t{font-size:13px;font-weight:500}
  .alert-body .s{font-size:11px;color:var(--ink4);margin-top:2px}
  .alert-cta{font-size:11px;padding:6px 10px;border:1px solid var(--line);border-radius:5px;background:#fff}
  .alert-cta:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  @media(max-width:1100px){.kpis{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.customers{grid-template-columns:2fr 1fr 1fr}}
</style>
</head>
<body>

<div class="top">
  <div class="top-l">
    <a href="WhatsLoyalty Live.html" class="back">← Inicio</a>
    <div class="biz-pick">
      <button class="biz-btn" id="bizBtn">
        <div class="biz-dot" id="bizInitial">P</div>
        <div><div class="biz-name" id="bizName">—</div><div class="biz-sec" id="bizSec">—</div></div>
        <div class="biz-chev">▾</div>
      </button>
      <div class="biz-menu" id="bizMenu"></div>
    </div>
  </div>
  <div class="top-r">
    <nav class="top-nav">
      <a class="on">Panel</a>
      <a id="navStaff">Staff</a>
      <a id="navClient">Cliente</a>
    </nav>
    <div class="top-meta"><span class="dot"></span>En vivo</div>
  </div>
</div>

<div class="page">
  <div class="page-head">
    <div>
      <div class="page-kicker" id="kicker">Panel del negocio</div>
      <h1 class="page-title" id="pgTitle">—</h1>
      <div class="page-sub" id="pgSub">—</div>
    </div>
    <div class="pills">
      <button class="on">7 días</button>
      <button>30 días</button>
      <button>Todo</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div class="panel">
      <div class="panel-h"><div class="panel-title">Ventas por día</div><div class="panel-sub" id="chartSub">—</div></div>
      <div class="chart" id="chart"></div>
      <div class="chart-x" id="chartX"></div>
    </div>
    <div class="panel">
      <div class="panel-h"><div class="panel-title">Segmentos</div></div>
      <div class="segments" id="segments"></div>
      <div style="margin-top:18px">
        <div class="panel-h" style="margin-bottom:10px"><div style="font-size:13px;font-weight:600">Alertas</div></div>
        <div class="alerts" id="alerts"></div>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-h"><div class="panel-title">Actividad reciente</div><div class="panel-sub">Últimos 20 movimientos</div></div>
      <div class="activity" id="activity"></div>
    </div>
    <div class="panel">
      <div class="panel-h"><div class="panel-title">Premios activos</div></div>
      <div class="rewards-grid" id="rewards"></div>
    </div>
  </div>

  <div class="panel" style="margin-top:20px">
    <div class="panel-h">
      <div class="panel-title">Clientes</div>
      <div class="panel-sub" id="custSub">—</div>
    </div>
    <div class="customers" id="customers"></div>
  </div>
</div>

<script>
(function(){
  WL.db.init();
  const bizId = WL.urlParam('b') || 'polka';
  let b = WL.getBusiness(bizId);

  // biz picker
  const bizBtn = document.getElementById('bizBtn');
  const bizMenu = document.getElementById('bizMenu');
  bizMenu.innerHTML = WL.BUSINESSES.map(bb => `
    <div class="biz-menu-item ${bb.id===b.id?'active':''}" onclick="location.href='WL Dashboard.html?b=${bb.id}'">
      <div class="biz-dot">${bb.name[0]}</div>
      <div><div class="biz-name">${bb.name}</div><div class="biz-sec">${bb.tagline}</div></div>
    </div>`).join('');
  bizBtn.onclick = () => bizMenu.classList.toggle('open');
  document.addEventListener('click', e => { if (!e.target.closest('.biz-pick')) bizMenu.classList.remove('open'); });

  document.getElementById('bizInitial').textContent = b.name[0];
  document.getElementById('bizName').textContent = b.name;
  document.getElementById('bizSec').textContent = b.tagline;
  document.getElementById('navStaff').href = 'WL Staff.html?b=' + b.id;
  document.getElementById('navClient').href = 'WL Cliente.html?b=' + b.id;

  document.getElementById('pgTitle').textContent = b.name;
  document.getElementById('pgSub').textContent = `${b.city} · ${b.address} · ${b.phone}`;

  render();
  WL.db.onChange(render);

  function render(){
    const s = WL.db.getStats(b.id);
    const series = WL.db.getDailySeries(b.id, 14);
    const currency = b.currency;

    // KPIs
    const deltaCls = s.revenue_change >= 0 ? 'up' : 'down';
    const deltaSym = s.revenue_change >= 0 ? '+' : '';
    document.getElementById('kpis').innerHTML = `
      <div class="kpi">
        <div class="k">Clientes <span class="delta up">+${s.new_this_week}</span></div>
        <div class="v">${WL.fmt.num(s.total_customers)}</div>
        <div class="sub">${s.active_customers} activos · ${s.dormant_customers} dormidos</div>
      </div>
      <div class="kpi">
        <div class="k">Ingresos 7d <span class="delta ${deltaCls}">${deltaSym}${s.revenue_change.toFixed(0)}%</span></div>
        <div class="v">${WL.fmt.money(s.revenue_week)}</div>
        <div class="sub">vs ${WL.fmt.money(s.revenue_prev_week)} semana pasada</div>
      </div>
      <div class="kpi">
        <div class="k">Ventas 7d</div>
        <div class="v">${WL.fmt.num(s.sales_this_week)}</div>
        <div class="sub">${s.redeems_this_week} canjes</div>
      </div>
      <div class="kpi">
        <div class="k">Reseñas Google</div>
        <div class="v">${s.reviews_left}<span style="font-size:16px;color:var(--ink4)"> / ${s.reviews_asked}</span></div>
        <div class="sub">${s.reviews_asked ? Math.round(s.reviews_left/s.reviews_asked*100) : 0}% tasa de conversión</div>
      </div>`;

    // chart
    const maxRev = Math.max(...series.map(d => d.revenue), 1);
    document.getElementById('chartSub').textContent = `Total 14d: ${WL.fmt.money(series.reduce((s,d)=>s+d.revenue,0))}`;
    document.getElementById('chart').innerHTML = series.map(d => `
      <div class="bar" style="height:${(d.revenue/maxRev)*100}%">
        <div class="bar-tooltip">${WL.fmt.date(d.date.getTime())} · ${WL.fmt.money(d.revenue)} · ${d.sales} ventas</div>
      </div>`).join('');
    document.getElementById('chartX').innerHTML = series.map((d,i) => `
      <div>${i%2===0 ? d.date.getDate() : ''}</div>`).join('');

    // segments
    document.getElementById('segments').innerHTML = `
      <div class="seg"><div class="k">Nuevos (7d)</div><div class="v">${s.new_this_week}</div><div class="b">Rasca bienvenida</div></div>
      <div class="seg"><div class="k">Activos</div><div class="v">${s.active_customers}</div><div class="b">Últimos 14 días</div></div>
      <div class="seg"><div class="k">En riesgo</div><div class="v">${s.dormant_customers}</div><div class="b">+30 días sin venir</div></div>
      <div class="seg"><div class="k">Ruleta lista</div><div class="v">${s.spins_unlocked}</div><div class="b">clientes</div></div>`;

    // alerts
    const alerts = [];
    if (s.dormant_customers > 0) alerts.push({ ico:'😴', t: `${s.dormant_customers} clientes dormidos`, s: 'Lanzar campaña "te echamos de menos"', cta: 'Recuperar' });
    if (s.spins_unlocked > 0) alerts.push({ ico:'🎡', t: `${s.spins_unlocked} ruletas sin girar`, s: 'Recordar por WhatsApp', cta: 'Enviar' });
    if (s.reviews_asked > s.reviews_left && s.reviews_asked > 0) alerts.push({ ico:'⭐', t: `${s.reviews_asked - s.reviews_left} reseñas pendientes`, s: 'Pidieron un canje, aún no reseñaron', cta: 'Reenviar' });
    if (!alerts.length) alerts.push({ ico:'✓', t: 'Todo al día', s: 'No hay acciones pendientes', cta: '' });
    document.getElementById('alerts').innerHTML = alerts.map(a => `
      <div class="alert"><div class="alert-ico">${a.ico}</div><div class="alert-body"><div class="t">${a.t}</div><div class="s">${a.s}</div></div>${a.cta ? `<button class="alert-cta">${a.cta}</button>` : ''}</div>`).join('');

    // activity
    const log = WL.db.getActivityLog(b.id, 14);
    const typeIco = { sale:'€', redeem:'🎁', welcome:'👋', spin:'🎡', scratch:'🎫', review:'⭐' };
    const typeLabel = { sale:'Venta', redeem:'Canje', welcome:'Bienvenida', spin:'Ruleta', scratch:'Rasca', review:'Reseña' };
    document.getElementById('activity').innerHTML = log.map(t => `
      <div class="act">
        <div class="act-ico ${t.type}">${typeIco[t.type]||'·'}</div>
        <div class="act-body">
          <div class="act-name">${t.customer.name} ${t.customer.surname}${t.type==='sale'?` · ${WL.fmt.money(t.amount)}`:''}${t.points?` · ${t.points>0?'+':''}${t.points} ${currency}`:''}</div>
          <div class="act-note">${t.note || typeLabel[t.type]}</div>
        </div>
        <div class="act-time">${WL.fmt.ago(t.created_at)}</div>
      </div>`).join('');

    // rewards
    document.getElementById('rewards').innerHTML = b.rewards.map(r => `
      <div class="rw ${r.featured?'feat':''}">
        <div><div class="rw-name">${r.name}</div><div class="rw-cost">${r.cost} ${currency}${r.auto?' · auto':''}</div></div>
        <div class="rw-ico">${r.icon}</div>
      </div>`).join('');

    // customers
    const customers = WL.db.getCustomers(b.id).slice(0, 12);
    document.getElementById('custSub').textContent = `${s.total_customers} en total · top 12 por actividad`;
    document.getElementById('customers').innerHTML = `
      <div class="customers-head">
        <div>Cliente</div><div>Teléfono</div><div>Saldo</div><div>Gasto total</div><div>Visitas</div><div>Estado</div>
      </div>` + customers.map(c => {
        const active = (Date.now() - c.last_activity) < 14*86400000;
        return `
      <div class="cust">
        <div class="cust-name"><div class="cust-avatar">${c.name[0]}${c.surname[0]||''}</div>${c.name} ${c.surname}</div>
        <div class="cust-phone">${c.phone}</div>
        <div><b>${c.balance}</b>&nbsp;<span style="color:var(--ink4);font-size:11px">${currency}</span></div>
        <div>${WL.fmt.money(c.total_spent)}</div>
        <div>${c.visits}</div>
        <div><span class="badge ${active?'active':'dormant'}">${active?'activo':'dormido'}</span></div>
      </div>`;}).join('');
  }
})();
</script>
</body>
</html>
